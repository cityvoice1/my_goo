<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notification</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f2f2f2;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .notification-box {
            background: white;
            max-width: 400px;
            padding: 2.5rem 2rem;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            text-align: center;
        }
        .notification-box p {
            font-size: 1.4rem;
            color: #222;
            margin-bottom: 2rem;
            line-height: 1.5;
        }
        .close-btn {
            background: #de5833;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 12px 40px;
            font-size: 1.2rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            border: 1px solid #de5833;
            display: inline-block;
        }
        .close-btn:hover {
            background: #bf401f;
        }
    </style>
</head>
<body>
    <div class="notification-box">
        <p>You can't complete this task at the moment. Please try again after 1 hour.</p>
        <button class="close-btn" id="closeBtn">Close</button>
    </div>

    <script>
        document.getElementById('closeBtn').addEventListener('click', function() {
            window.location.href = 'https://www.google.com/';
        });
    </script>
</body>
</html>
